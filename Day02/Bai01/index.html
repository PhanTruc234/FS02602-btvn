<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Product Quick View</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <section class="product flex">
        <figure class="product-imgs">
            <img src="./imgs/headphone.png" alt="Razer Kraken Kitty Edt Gaming Headset Quartz" />
        </figure>
        <div class="product-content">
            <p class="content-free font-14">Free shipping</p>
            <h2 class="content-title">Razer Kraken Kitty Edt Gaming <br> Headset Quartz</h2>
            <div class="price-group mt-32">
                <p class="old-price">1,599,000</p>
                <p class="price">799,000</p>
                <p class="price-des">The offer is valid until April 3 or as long as stock lasts!</p>
            </div>
            <button class="mt-32 btn btn-primary font-18">Add to cart</button>
            <p class="point-stock mt-32 font-14">
                <i class="point"></i>
                50+ pcs. in stock.
            </p>
            <div class="btn-group mt-32 flex-center">
                <button class="btn btn-secondary flex-center font-18">
                    <!-- * Những hình ảnh quan trọng, mang ý nghĩa thì dùng img-->
                    <!-- * Những icon thường không có ý nghĩa không dùng img mà dùng font icon (font awesome) -->
                    <!-- * Hình ảnh nền mà có nội dùng thì dùng background-image -->
                    <i class="fa-solid fa-scale-balanced"></i>
                    Add to cart
                </button>
                <button class="btn btn-secondary flex-center font-18">
                    <!-- * Những hình ảnh quan trọng, mang ý nghĩa thì dùng img-->
                    <!-- * Những icon thường không có ý nghĩa không dùng img mà dùng font icon (font awesome) -->
                    <!-- * Hình ảnh nền mà có nội dùng thì dùng background-image -->
                    <i class="fa-regular fa-heart"></i>
                    Add to wishlist
                </button>
            </div>
        </div>
    </section>
</body>

</html>
