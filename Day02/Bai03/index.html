<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Jost:ital,wght@0,100..900;1,100..900&family=Luxurious+Script&family=Merriweather:ital,opsz,wght@0,18..144,300..900;1,18..144,300..900&family=Roboto:ital,wght@0,100..900;1,100..900&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div class="collection">
        <header>
            <h2>Popular Collections</h2>
            <nav class="flex-center">
                <button class="btn">Profile</button>
                <button class="btn">New York</button>
                <button class="btn">Relaxing</button>
                <button class="btn">Person</button>
                <button class="btn">Fashion</button>
            </nav>
        </header>
        <main class="collection-list flex-center">
            <div class="collection-card">
                <div class="collection-thumbnail">
                    <img src="./imgs/girl.png" alt="girl">
                </div>
                <div class="sub-thumbnail flex-center">
                    <img src="./imgs/girl_1.png" alt="girl_1">
                    <img src="./imgs/girl_2.png" alt="girl_2">
                    <img src="./imgs/girl_3.png" alt="girl_3">
                </div>
                <div class="collection-des flex-between">
                    <p class="collection-text">People</p>
                    <p class="quantity flex-center">
                        <i class="fa-regular fa-image"></i>
                        <span>144</span>
                    </p>
                </div>
            </div>
            <div class="collection-card">
                <div class="collection-thumbnail">
                    <img src="./imgs/desert.png" alt="girl">
                </div>
                <div class="sub-thumbnail flex-center">
                    <img src="./imgs/desert_1.png" alt="girl_1">
                    <img src="./imgs/desert_2.png" alt="girl_2">
                    <img src="./imgs/desert_3.png" alt="girl_3">
                </div>
                <div class="collection-des flex-between">
                    <p class="collection-text">People</p>
                    <p class="quantity flex-center">
                        <i class="fa-regular fa-image"></i>
                        <span>7k</span>
                    </p>
                </div>
            </div>
            <div class="collection-card">
                <div class="collection-thumbnail">
                    <img src="./imgs/building.png" alt="girl">
                </div>
                <div class="sub-thumbnail flex-center">
                    <img src="./imgs/building_1.png" alt="girl_1">
                    <img src="./imgs/building_2.png" alt="girl_2">
                    <img src="./imgs/building_3.png" alt="girl_3">
                </div>
                <div class="collection-des flex-between">
                    <p class="collection-text">People</p>
                    <p class="quantity flex-center">
                        <i class="fa-regular fa-image"></i>
                        <span>431</span>
                    </p>
                </div>
            </div>
        </main>
    </div>
</body>

</html>
