<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        body {
            font-family: "Poppins", sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        .login-text {
            font-weight: 400;
            font-size: 24px;
            text-align: center;
        }

        .form-login {
            margin-top: 24px;
            background-color: white;
            box-shadow: 0 24px 28px 9px #B3C1D954;
            width: 320px;
            padding: 24px;
            border-radius: 15px;
        }

        .login-email {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .lable {
            font-size: 14px;
            font-weight: 400;
        }

        .lable-forgot {
            color: #0088FF;
        }

        input {
            padding: 8px;
            border: 1px solid #B3C1D9;
            border-radius: 4px;
            width: 100%;
            background-color: #F9F9F9CC;
        }

        .login-password {
            margin-top: 24px;
        }

        .password-lable {
            display: flex;
            justify-content: space-between;
            margin-bottom: 8px;
        }

        .btn {
            margin-top: 24px;
            width: 100%;
            padding: 8px;
            border-radius: 8px;
            background-color: #0088FF;
            border: none;
            color: white;
            font-weight: 700;
        }

        .login-question {
            font-size: 14px;
            margin-top: 24px;
            text-align: center;
            font-weight: 400;
        }

        .lable-create {
            color: #0088FF;
        }
    </style>
</head>

<body>
    <div class="login-form">
        <h2 class="login-text">Login</h2>
        <form action="" class="form-login">
            <div class="login-email">
                <label for="" class="lable">Email</label>
                <input type="text" placeholder="example@gmail.com">
            </div>
            <div class="login-password">
                <div class="password-lable">
                    <label for="" class="lable">Password</label>
                    <label for="" class="lable lable-forgot">Forgot password?</label>
                </div>
                <input type="password" name="" id="">
            </div>
            <button type="submit" class='btn'>Login</button>
            <div class="login-question">
                <span>Don't have account?</span>
                <span class="lable-create">Create new account</span>
            </div>
        </form>
    </div>
</body>

</html>
