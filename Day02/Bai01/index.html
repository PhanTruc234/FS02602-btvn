<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>
<style>
    body {
        font-family: "Poppins", sans-serif;
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
    }

    * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
    }

    .container {
        width: 887px;
        height: 661px;
        background-color: white;
        box-shadow: 0 24px 28px 9px #B3C1D954;
        border-radius: 15px;
        display: flex;
        justify-content: center;
        align-items: center;

    }

    .container>div {
        width: 723px;
        display: flex;
        gap: 32px;
    }

    .img-container img {
        object-fit: cover;
        width: 100%;
    }

    .img-container {
        width: 249px;
        height: 223px;
    }

    .product-info {
        margin-top: 20px;
        flex: 1;
        display: flex;
        flex-direction: column;
        gap: 32px;
    }

    .free-shipping {
        background-color: #191847;
        color: white;
        border-radius: 20px;
        padding: 4px 8px 4px 8px;
        font-size: 14px;
        font-weight: 600;
        margin-bottom: 10px;
    }

    .title {
        font-size: 24px;
        font-weight: 600;
        color: #191847;
        margin-top: 8px;
    }

    .price-line-through {
        font-size: 18px;
        text-decoration: line-through;
        color: #191847;
        margin: 0;
        font-weight: 400;
    }

    .price {
        font-size: 48px;
        font-weight: 700;
        color: #191847;
        margin: 0;
    }

    .description {
        font-size: 14px;
        font-weight: 400;
        color: #191847;
        margin: 0;
    }

    .btn-add-to-cart {
        font-size: 18px;
        font-weight: 500;
        color: white;
        width: 100%;
        border-radius: 8px;
        padding: 16px;
        background-color: #4788E9;
        border: none;
        box-shadow: 0 7px 0 0#1C57EE;
    }

    .active {
        width: 13px;
        height: 13px;
        background-color: #00D98B;
        border-radius: 100%;
        display: inline-block;
    }

    .stock {
        font-size: 14px;
        font-weight: 400;
        color: #191847;
        margin-left: 5px;
    }

    .section-btn {
        display: flex;
        align-items: center;
        gap: 16px;
    }

    .btn-cart,
    .btn-wish {
        width: 100%;
        display: flex;
        border: none;
        align-items: center;
        gap: 10px;
        padding: 16px;
        border: 2px solid #C9C9DA;
        border-radius: 8px;
        background-color: transparent;
    }

    .btn-cart>img,
    .btn-wish>img {
        width: 32px;
        height: 32px;
    }

    .btn-cart>span,
    .btn-wish>span {
        font-size: 18px;
        font-weight: 400;
        color: #191847;
    }
</style>

<body>
    <article class="container">
        <div>
            <div class="img-container">
                <img src="./imgs/headphone.png" alt="head phone">
            </div>
            <div class="product-info">
                <div>
                    <span class="free-shipping">Free Shipping</span>
                    <h1 class="title">Razer Kraken Kitty Edt Gaming <br> Headset Quartz</h1>
                </div>
                <div>
                    <p class="price-line-through">1 599,000</p>
                    <p class="price">799,000</p>
                    <p class="description">The offer is valid until April 3 or as long as stock lasts!</p>
                </div>
                <div>
                    <button class="btn-add-to-cart">Add to cart</button>
                </div>
                <div class="active-stock">
                    <span class="active"></span>
                    <span class="stock">50+ pcs. in stock.</span>
                </div>
                <div class="section-btn">
                    <button class="btn-cart">
                        <img src="./imgs/cart.svg" alt="Add to cart">
                        <span>Add to cart</span>
                    </button>
                    <button class="btn-wish">
                        <img src="./imgs/wishlist.svg" alt="Add to wishlist">
                        <span>Add to wishlist</span>
                    </button>
                </div>
            </div>
        </div>
    </article>
</body>

</html>
