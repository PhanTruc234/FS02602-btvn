<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Product Quick View</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: "Poppins", sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        .product {
            width: 887px;
            height: 661px;
            background-color: white;
            box-shadow: 0 24px 28px 9px #B3C1D954;
            border-radius: 15px;
            display: flex;
            justify-content: center;
            gap: 32px;
            padding: 70px;
        }

        .product-imgs {
            width: 249px;
            height: 223px;
        }

        .product-imgs img {
            object-fit: cover;
            width: 100%;
        }

        .product-content {
            margin-top: 20px;
            flex: 1;
        }

        .content-free {
            display: inline;
            background-color: #191847;
            color: white;
            border-radius: 20px;
            padding: 4px 8px 4px 8px;
            font-size: 14px;
            font-weight: 600;
            margin-bottom: 10px;
        }

        .content-title {
            font-size: 24px;
            font-weight: 600;
            color: #191847;
            margin-top: 8px;
        }

        .price-group {
            display: flex;
            flex-direction: column;
            gap: 8px;
            margin-top: 32px;
        }

        .old-price {
            text-decoration: line-through;
            color: #191847;
            margin: 0;
            padding: 0;
            font-weight: 400;
        }

        .price {
            font-size: 48px;
            font-weight: 700;
            color: #191847;
            padding: 0;
            margin: 0;
        }

        .price-des {
            font-size: 14px;
            font-weight: 400;
            color: #191847;
            margin: 0;
            padding: 0;
        }

        .btn {
            width: 100%;
            border-radius: 8px;
            padding: 16px;
            border: none;
        }

        .btn-primary {
            margin-top: 32px;
            font-size: 18px;
            font-weight: 500;
            color: white;
            background-color: #4788E9;
            box-shadow: 0 7px 0 0#1C57EE;
        }

        .point-stock {
            margin-top: 32px;
        }

        .point {
            width: 13px;
            height: 13px;
            background-color: #00D98B;
            border-radius: 100%;
            display: inline-block;
        }

        .btn-group {
            display: flex;
            gap: 10px;
        }

        .btn-secondary {
            margin-top: 32px;
            font-size: 18px;
            font-weight: 500;
            color: #191847;
            background-color: transparent;
            gap: 10px;
            border: 2px solid #C9C9DA;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        i {
            font-size: 25px;
        }
    </style>
</head>

<body>
    <div class="product">
        <div class="product-imgs">
            <img src="./imgs/headphone.png" alt="Razer Kraken Kitty Edt Gaming Headset Quartz" />
        </div>
        <div class="product-content">
            <p class="content-free">Free shipping</p>
            <h2 class="content-title">Razer Kraken Kitty Edt Gaming Headset Quartz</h2>
            <div class="price-group">
                <p class="old-price">1,599,000</p>
                <p class="price">799,000</p>
                <p class="price-des">The offer is valid until April 3 or as long as stock lasts!</p>
            </div>
            <button class="btn btn-primary">Add to cart</button>
            <p class="point-stock">
                <i class="point"></i>
                50+ pcs. in stock.
            </p>
            <div class="btn-group">
                <button class="btn btn-secondary">
                    <!-- * Những hình ảnh quan trọng, mang ý nghĩa thì dùng img-->
                    <!-- * Những icon thường không có ý nghĩa không dùng img mà dùng font icon (font awesome) -->
                    <!-- * Hình ảnh nền mà có nội dùng thì dùng background-image -->
                    <i class="fa-solid fa-scale-balanced"></i>
                    <p>Add to cart</p>
                </button>
                <button class="btn btn-secondary">
                    <!-- * Những hình ảnh quan trọng, mang ý nghĩa thì dùng img-->
                    <!-- * Những icon thường không có ý nghĩa không dùng img mà dùng font icon (font awesome) -->
                    <!-- * Hình ảnh nền mà có nội dùng thì dùng background-image -->
                    <i class="fa-regular fa-heart"></i>
                    <p>Add to wishlist</p>
                </button>
            </div>
        </div>
    </div>
</body>

</html>
