<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    <link rel="stylesheet" href="./css/reset.css">
    <link rel="stylesheet" href="./css/style.css">
</head>

<body>
    <section>
        <header class="header">
            <h2 class="title">Open positions</h2>
        </header>
        <main class="card-list flex">
            <div class="card">
                <div class="card-option flex-center">
                    <div class=" card-icon card-design flex-center">
                        <i class="fa-solid fa-paintbrush"></i>
                    </div>
                    <h3 class="card-title">Design</h3>
                </div>
                <button class="card-btn">
                    <span>4</span>
                    <span>open positions</span>
                </button>
            </div>
            <div class="card">
                <div class="card-option flex-center">
                    <div class="card-icon  card-engineering flex-center">
                        <i class="fa-solid fa-code"></i>
                    </div>
                    <h3 class="card-title">Engineering</h3>
                </div>
                <button class="card-btn">
                    <span>8</span>
                    <span>open positions</span>
                </button>
            </div>
            <div class="card">
                <div class="card-option  flex-center">
                    <div class="card-icon card-operations flex-center">
                        <i class="fa-solid fa-gear"></i>
                    </div>
                    <h3 class="card-title">Operations</h3>
                </div>
                <button class="card-btn">
                    <span>2</span>
                    <span>open positions</span>
                </button>
            </div>
            <div class="card">
                <div class="card-option  flex-center">
                    <div class="card-icon card-people flex-center">
                        <i class="fa-solid fa-users"></i>
                    </div>
                    <h3 class="card-title">People</h3>
                </div>
                <button class="card-btn">
                    <span>6</span>
                    <span>open positions</span>
                </button>
            </div>
            <div class="card">
                <div class="card-option  flex-center">
                    <div class="card-icon card-sales flex-center">
                        <i class="fa-solid fa-clipboard"></i>
                    </div>
                    <h3 class="card-title">Sales</h3>
                </div>
                <button class="card-btn">
                    <span>7</span>
                    <span>open positions</span>
                </button>
            </div>
            <div class="card">
                <div class="card-option  flex-center">
                    <div class="card-icon card-university flex-center">
                        <i class="fa-solid fa-graduation-cap"></i>
                    </div>
                    <h3 class="card-title">University</h3>
                </div>
                <button class="card-btn">
                    <span>8</span>
                    <span>open positions</span>
                </button>
            </div>
        </main>
    </section>
</body>

</html>
